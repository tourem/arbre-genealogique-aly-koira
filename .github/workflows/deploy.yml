name: Deploy to Dokploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version-and-deploy:
    name: Bump Version & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip if version bump commit
        id: skip
        run: |
          MSG=$(git log -1 --pretty=format:"%s")
          if [[ "$MSG" == chore:\ bump\ version* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine version bump from commits
        if: steps.skip.outputs.skip == 'false'
        id: bump
        run: |
          # Get commit messages since last version tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${LAST_TAG}..HEAD"
          fi

          COMMITS=$(git log "$RANGE" --pretty=format:"%s" 2>/dev/null || echo "")

          # Determine bump type from commit prefixes
          if echo "$COMMITS" | grep -qiE "^(BREAKING|Major):"; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$COMMITS" | grep -qiE "^(Feat|Add|Redesign):"; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          elif echo "$COMMITS" | grep -qiE "^(Fix|Refactor|Clean|Perf):"; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version in package.json
        if: steps.skip.outputs.skip == 'false'
        id: version
        working-directory: react-app
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          BUMP="${{ steps.bump.outputs.type }}"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          npm version "$NEW_VERSION" --no-git-tag-version
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped $CURRENT -> $NEW_VERSION ($BUMP)"

      - name: Commit & tag version
        if: steps.skip.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add react-app/package.json react-app/package-lock.json
          git commit -m "chore: bump version to v${{ steps.version.outputs.version }}" || echo "No changes to commit"
          git tag "v${{ steps.version.outputs.version }}"
          git push
          git push --tags

      - name: Deploy via Dokploy API
        if: steps.skip.outputs.skip == 'false'
        env:
          DOKPLOY_URL: ${{ vars.DOKPLOY_URL }}
          DOKPLOY_APP_ID: ${{ vars.DOKPLOY_APP_ID }}
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
        run: |
          DOKPLOY_URL="$(echo "$DOKPLOY_URL" | xargs)"
          curl -sSf -X POST "${DOKPLOY_URL}/api/application.redeploy" \
            -H "x-api-key: ${DOKPLOY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"applicationId\": \"${DOKPLOY_APP_ID}\"}"
          echo "Deployed v${{ steps.version.outputs.version }}"
